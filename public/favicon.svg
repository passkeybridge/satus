  <text x="9" y="46"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="40" font-weight="500" fill="#0a0a0a">s</text>
  <rect x="35" y="40" width="7" height="7" fill="#dc2626"/>
</svg>
